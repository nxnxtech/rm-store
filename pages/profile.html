<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile | Roger McDaniels</title>
  <link rel="icon" type="image/png" href="../assets/rm-logo.jpg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/main.css">
  <style>
    .profile-hero {
      background: linear-gradient(135deg, #d4d4d4 0%, #e8e8e8 50%, #c8c8c8 100%);
      padding-top: 140px;
      padding-bottom: 60px;
    }
    .profile-hero-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 40px;
      text-align: center;
    }
    .profile-hero h1 {
      font-size: 40px;
      font-weight: 800;
      letter-spacing: -1px;
      margin-bottom: 10px;
    }
    .profile-section {
      max-width: 900px;
      margin: 0 auto;
      padding: 50px 40px 100px;
    }
    .profile-card {
      background: var(--glass-bg);
      backdrop-filter: var(--blur);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-xl);
      padding: 36px;
      box-shadow: var(--glass-shadow);
      display: flex;
      align-items: center;
      gap: 24px;
      margin-bottom: 32px;
    }
    .profile-avatar {
      width: 84px;
      height: 84px;
      border-radius: 50%;
      background: var(--accent);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .profile-avatar img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
    }
    .profile-info h2 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .profile-info p {
      font-size: 14px;
      color: var(--text-muted);
    }
    .profile-info span {
      font-size: 12px;
      color: var(--text-muted-light);
      display: block;
      margin-top: 6px;
    }
    .profile-quick-links {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-bottom: 32px;
    }
    .profile-quick-link {
      background: var(--glass-bg);
      backdrop-filter: var(--blur);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-lg);
      padding: 26px;
      text-align: center;
      box-shadow: var(--glass-shadow);
      transition: transform var(--transition-normal);
    }
    .profile-quick-link:hover {
      transform: translateY(-4px);
    }
    .profile-quick-link svg {
      width: 26px;
      height: 26px;
      margin-bottom: 12px;
    }
    .profile-quick-link h4 {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .profile-quick-link p {
      font-size: 13px;
      color: var(--text-muted);
    }
    .profile-signout {
      text-align: center;
    }
    .profile-edit-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      margin-bottom: 32px;
    }
    .profile-edit-card {
      background: var(--glass-bg);
      backdrop-filter: var(--blur);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-xl);
      padding: 28px;
      box-shadow: var(--glass-shadow);
    }
    .profile-edit-card h3 {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .profile-edit-card h3 svg {
      width: 18px;
      height: 18px;
    }
    .profile-form-msg {
      font-size: 13px;
      padding: 10px 14px;
      border-radius: var(--radius-md);
      margin-bottom: 14px;
      display: none;
    }
    .profile-form-msg.success {
      display: block;
      background: rgba(34,197,94,0.1);
      color: var(--success);
    }
    .profile-form-msg.error {
      display: block;
      background: rgba(239,68,68,0.08);
      color: var(--danger);
    }
    @media (max-width: 768px) {
      .profile-edit-grid { grid-template-columns: 1fr; }
    }
    .profile-edit-card.full-width {
      grid-column: 1 / -1;
    }
    .profile-edit-card .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    @media (max-width: 640px) {
      .profile-edit-card .form-row { grid-template-columns: 1fr; }
    }
    @media (max-width: 640px) {
      .profile-card { flex-direction: column; text-align: center; }
      .profile-quick-links { display: none;}
    }
  </style>
</head>
<body>

<div id="header-placeholder"></div>

<section class="profile-hero">
  <div class="profile-hero-inner">
    <h1>My Profile</h1>
  </div>
</section>

<section class="profile-section" id="profile-content">
  </section>

<div id="footer-placeholder"></div>

<script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script defer src="../js/supabase-client.js"></script>
<script defer src="../js/main.js"></script>
<script defer src="../components/header.js"></script>
<script defer src="../components/footer.js"></script>
<script defer src="../components/cart.js"></script>
<script defer src="../components/checkout.js"></script>
<script defer src="../components/comment.js"></script>
<script defer src="../components/scroll-hint.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
  if (requireAuth()) {
    const user = state.currentUser;
    const joinedDate = user.joined ? new Date(user.joined).toLocaleDateString('en-US', { month: 'long', year: 'numeric' }) : '';

    document.getElementById('profile-content').innerHTML = `
      <div class="profile-card fade-in">
        <div class="profile-avatar">
          ${user.avatar ? `<img src="${assetPath(user.avatar)}" alt="${user.name}">` : user.name.charAt(0).toUpperCase()}
        </div>
        <div class="profile-info">
          <h2>${user.name}</h2>
          <p>${user.email}</p>
          ${joinedDate ? `<span>Member since ${joinedDate}</span>` : ''}
        </div>
      </div>

      <div class="profile-quick-links">
        <a href="wishlist.html" class="profile-quick-link fade-in stagger-1">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
          <h4>Wishlist</h4>
          <p>Items you've saved</p>
        </a>
        <a href="orders.html" class="profile-quick-link fade-in stagger-2">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="M3.3 7 12 12l8.7-5"/><path d="M12 22V12"/></svg>
          <h4>Order History</h4>
          <p>Track past purchases</p>
        </a>
        <a href="shop.html" class="profile-quick-link fade-in stagger-3">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
          <h4>Continue Shopping</h4>
          <p>Browse the full catalog</p>
        </a>
      </div>

      <div class="profile-edit-grid">
        <div class="profile-edit-card fade-in">
          <h3>${getIcon('user')} Edit Name</h3>
          <div class="profile-form-msg" id="name-msg"></div>
          <form id="name-form">
            <div class="form-group">
              <label for="edit-name">Full Name</label>
              <input type="text" id="edit-name" required value="${user.name}">
            </div>
            <button type="submit" class="btn btn-primary">Save Changes</button>
          </form>
        </div>

        <div class="profile-edit-card fade-in stagger-1">
          <h3>${getIcon('shield-check')} Change Password</h3>
          <div class="profile-form-msg" id="password-msg"></div>
          <form id="password-form">
            <div class="form-group">
              <label for="current-password">Current Password</label>
              <input type="password" id="current-password" required placeholder="Enter current password">
            </div>
            <div class="form-group">
              <label for="new-password">New Password</label>
              <input type="password" id="new-password" required placeholder="At least 6 characters" minlength="6">
            </div>
            <div class="form-group">
              <label for="confirm-password">Confirm New Password</label>
              <input type="password" id="confirm-password" required placeholder="Re-enter new password">
            </div>
            <button type="submit" class="btn btn-primary">Update Password</button>
          </form>
        </div>

        <div class="profile-edit-card fade-in stagger-2 full-width">
          <h3>${getIcon('map-pin')} Delivery Details</h3>
          <div class="profile-form-msg" id="delivery-msg"></div>
          <form id="delivery-form">
            <div class="form-group">
              <label for="edit-phone">Phone Number</label>
              <input type="tel" id="edit-phone" required placeholder="024 123 4567" value="${user.phone || ''}">
            </div>
            <div class="form-group">
              <label for="edit-address">Delivery Address</label>
              <input type="text" id="edit-address" required placeholder="House number, street name, area name" value="${user.address || ''}">
            </div>
            <div class="form-row">
              <div class="form-group">
                <label for="edit-region">Region</label>
                <select id="edit-region" required onchange="populateProfileCities()">
                  <option value="">Select region</option>
                </select>
              </div>
              <div class="form-group">
                <label for="edit-city">City / Town</label>
                <select id="edit-city" required>
                  <option value="">Select region first</option>
                </select>
              </div>
            </div>
            <button type="submit" class="btn btn-primary">Save Delivery Details</button>
          </form>
        </div>
      </div>

      <div class="profile-signout fade-in">
        <button class="btn btn-glass" onclick="signOut()">Sign Out</button>
      </div>
    `;

    initScrollAnimations();

    // Populate the delivery-details region/city selects with the user's
    // saved values, same cascading pattern as checkout.
    (async () => {
      const regions = await loadRegions();
      const regionSelect = document.getElementById('edit-region');
      const citySelect = document.getElementById('edit-city');
      if (!regionSelect) return;

      regionSelect.innerHTML = '<option value="">Select region</option>' +
        regions.map(r => `<option value="${r.region}">${r.region}</option>`).join('');

      if (user.region) {
        regionSelect.value = user.region;
        populateProfileCities();
        if (user.city) citySelect.value = user.city;
      }
    })();

    document.getElementById('name-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const msg = document.getElementById('name-msg');
      const name = document.getElementById('edit-name').value;
      const result = await updateUserProfile({ name });
      msg.className = 'profile-form-msg ' + (result.success ? 'success' : 'error');
      msg.textContent = result.success ? 'Profile updated successfully.' : result.message;
      if (result.success) {
        document.querySelector('.profile-info h2').textContent = state.currentUser.name;
        showToast('Profile updated!', 'success');
      }
    });

    document.getElementById('delivery-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const msg = document.getElementById('delivery-msg');
      const phone = document.getElementById('edit-phone').value.trim();
      const address = document.getElementById('edit-address').value.trim();
      const region = document.getElementById('edit-region').value;
      const city = document.getElementById('edit-city').value;

      if (!region || !city) {
        msg.className = 'profile-form-msg error';
        msg.textContent = 'Please select your region and city/town.';
        return;
      }

      const result = await updateUserProfile({ phone, address, region, city });
      msg.className = 'profile-form-msg ' + (result.success ? 'success' : 'error');
      msg.textContent = result.success ? 'Delivery details updated successfully.' : result.message;
      if (result.success) {
        showToast('Delivery details updated!', 'success');
      }
    });

    document.getElementById('password-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const msg = document.getElementById('password-msg');
      const current = document.getElementById('current-password').value;
      const next = document.getElementById('new-password').value;
      const confirm = document.getElementById('confirm-password').value;

      if (next !== confirm) {
        msg.className = 'profile-form-msg error';
        msg.textContent = 'New passwords do not match.';
        return;
      }

      const result = await changePassword(current, next);
      msg.className = 'profile-form-msg ' + (result.success ? 'success' : 'error');
      msg.textContent = result.success ? 'Password updated successfully.' : result.message;
      if (result.success) {
        e.target.reset();
        showToast('Password updated!', 'success');
      }
    });
  }
  });

  function populateProfileCities() {
    const regionSelect = document.getElementById('edit-region');
    const citySelect = document.getElementById('edit-city');
    const region = state.regionsData.find(r => r.region === regionSelect.value);

    if (!region) {
      citySelect.innerHTML = '<option value="">Select region first</option>';
      return;
    }

    citySelect.innerHTML = '<option value="">Select city</option>' +
      region.cities.map(c => `<option value="${c}">${c}</option>`).join('');
  }
</script>
</body>
</html>
