<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password | Roger McDaniels</title>
  <link rel="icon" type="image/png" href="../assets/rm-logo.jpg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/main.css">
  <style>
    .reset-hero {
      background: linear-gradient(135deg, #d4d4d4 0%, #e8e8e8 50%, #c8c8c8 100%);
      padding-top: 140px;
      padding-bottom: 60px;
    }
    .reset-hero-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 40px;
      text-align: center;
    }
    .reset-hero h1 {
      font-size: 40px;
      font-weight: 800;
      letter-spacing: -1px;
      margin-bottom: 10px;
    }
    .reset-hero p {
      font-size: 16px;
      color: var(--text-muted);
    }
    .reset-section {
      max-width: 480px;
      margin: 0 auto;
      padding: 50px 20px 100px;
    }
    .reset-panel {
      background: var(--glass-bg);
      backdrop-filter: var(--blur);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-xl);
      padding: 40px;
      box-shadow: var(--glass-shadow);
    }
    .reset-form-msg {
      font-size: 13px;
      padding: 12px 14px;
      border-radius: var(--radius-md);
      margin-bottom: 18px;
      display: none;
    }
    .reset-form-msg.success {
      display: block;
      background: rgba(34,197,94,0.1);
      color: var(--success);
    }
    .reset-form-msg.error {
      display: block;
      background: rgba(239,68,68,0.08);
      color: var(--danger);
    }
    .password-input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }
    .password-input-wrapper input {
      flex: 1;
      padding-right: 40px;
    }
    .password-toggle-btn {
      position: absolute;
      right: 12px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      transition: color var(--transition-fast);
      font-size: 0;
    }
    .password-toggle-btn:hover {
      color: var(--text-dark);
    }
    .password-toggle-btn svg {
      width: 18px;
      height: 18px;
    }
    .reset-success-state {
      display: none;
      text-align: center;
    }
    .reset-success-state.active {
      display: block;
    }
    .reset-success-state svg {
      width: 48px;
      height: 48px;
      margin: 0 auto 16px;
      display: block;
    }
    .reset-success-state h3 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .reset-success-state p {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 24px;
    }
    .reset-form {
      display: block;
    }
    .reset-form.hidden {
      display: none;
    }
    .reset-submit-btn {
      width: 100%;
      justify-content: center;
      margin-top: 8px;
    }
    .password-strength-meter {
      margin-top: 8px;
      display: flex;
      gap: 4px;
      height: 4px;
    }
    .password-strength-bar {
      flex: 1;
      height: 100%;
      background: #e5e7eb;
      border-radius: 2px;
      transition: background-color 0.3s ease;
    }
    .password-strength-bar.filled {
      background: #ef4444;
    }
    .password-strength-bar.filled.medium {
      background: #f59e0b;
    }
    .password-strength-bar.filled.strong {
      background: #10b981;
    }
    .password-strength-label {
      font-size: 12px;
      margin-top: 6px;
      font-weight: 500;
    }
    .password-strength-label.weak {
      color: #ef4444;
    }
    .password-strength-label.medium {
      color: #f59e0b;
    }
    .password-strength-label.strong {
      color: #10b981;
    }
  </style>
</head>
<body>

<div id="header-placeholder"></div>

<section class="reset-hero">
  <div class="reset-hero-inner">
    <h1>Reset Password</h1>
    <p>Create a new password for your account</p>
  </div>
</section>

<section class="reset-section">
  <div class="reset-panel fade-in">
    <div class="reset-form-msg" id="reset-msg"></div>

    <!-- Reset Form -->
    <form class="reset-form" id="reset-form">
      <div class="form-group">
        <label for="new-password">New Password</label>
        <div class="password-input-wrapper">
          <input type="password" id="new-password" required placeholder="At least 6 characters" minlength="6" oninput="checkPasswordStrength()">
          <button type="button" class="password-toggle-btn" onclick="togglePasswordVisibility('new-password')" aria-label="Toggle password visibility">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <div class="password-strength-meter" id="strength-meter">
          <div class="password-strength-bar"></div>
          <div class="password-strength-bar"></div>
          <div class="password-strength-bar"></div>
        </div>
        <div class="password-strength-label" id="strength-label">Enter a password</div>
      </div>

      <div class="form-group">
        <label for="confirm-password">Confirm Password</label>
        <div class="password-input-wrapper">
          <input type="password" id="confirm-password" required placeholder="Re-enter new password">
          <button type="button" class="password-toggle-btn" onclick="togglePasswordVisibility('confirm-password')" aria-label="Toggle password visibility">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <button type="submit" class="btn btn-primary reset-submit-btn">
        Reset Password
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      </button>
    </form>

    <!-- Success State -->
    <div class="reset-success-state" id="reset-success">
      <svg viewBox="0 0 24 24" fill="none" stroke="var(--success)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>
      </svg>
      <h3>Password reset successfully!</h3>
      <p>Your password has been updated. You can now sign in with your new password.</p>
      <button class="btn btn-primary" onclick="window.location.href='signin.html'" style="width: 100%;">
        Back to Sign In
      </button>
    </div>
  </div>
</section>

<div id="footer-placeholder"></div>

<script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script defer src="../js/supabase-client.js"></script>
<script defer src="../js/main.js"></script>
<script defer src="../components/header.js"></script>
<script defer src="../components/footer.js"></script>
<script>
  function checkPasswordStrength() {
    const password = document.getElementById('new-password').value;
    const meter = document.querySelectorAll('.password-strength-bar');
    const label = document.getElementById('strength-label');

    if (!password) {
      meter.forEach(bar => {
        bar.classList.remove('filled', 'medium', 'strong');
      });
      label.textContent = 'Enter a password';
      label.className = 'password-strength-label';
      return;
    }

    // Calculate strength
    let strength = 0;
    const checks = {
      length: password.length >= 8,
      uppercase: /[A-Z]/.test(password),
      lowercase: /[a-z]/.test(password),
      numbers: /\d/.test(password),
      special: /[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/.test(password)
    };

    strength += checks.length ? 1 : 0;
    strength += checks.uppercase ? 1 : 0;
    strength += checks.lowercase ? 1 : 0;
    strength += checks.numbers ? 0.5 : 0;
    strength += checks.special ? 0.5 : 0;

    let level = 'weak';
    let filledBars = 1;

    if (strength >= 3) {
      level = 'medium';
      filledBars = 2;
    }
    if (strength >= 4) {
      level = 'strong';
      filledBars = 3;
    }

    // Update meter
    meter.forEach((bar, index) => {
      if (index < filledBars) {
        bar.classList.add('filled', level);
      } else {
        bar.classList.remove('filled', 'medium', 'strong');
      }
    });

    // Update label
    const labels = {
      weak: '⚠️ Weak password',
      medium: '👍 Medium strength',
      strong: '✓ Strong password'
    };
    label.textContent = labels[level];
    label.className = `password-strength-label ${level}`;
  }

  function togglePasswordVisibility(inputId) {
    const input = document.getElementById(inputId);
    const btn = document.querySelector(`button[onclick="togglePasswordVisibility('${inputId}')"]`);
    
    if (input.type === 'password') {
      input.type = 'text';
      btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>';
    } else {
      input.type = 'password';
      btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
    }
  }

  function showMessage(message, isError = false) {
    const el = document.getElementById('reset-msg');
    el.textContent = message;
    el.className = 'reset-form-msg ' + (isError ? 'error' : 'success');
  }

  document.addEventListener('DOMContentLoaded', async () => {
    // Check if there's a session (Supabase recovery token in URL)
    // The token is automatically handled by Supabase auth session detection
    const { data: { session } } = await supabase.auth.getSession();

    if (!session) {
      showMessage('Invalid or expired reset link. Please request a new password reset.', true);
      document.getElementById('reset-form').classList.add('hidden');
      return;
    }

    document.getElementById('reset-form').addEventListener('submit', async (e) => {
      e.preventDefault();

      const newPassword = document.getElementById('new-password').value;
      const confirmPassword = document.getElementById('confirm-password').value;

      if (newPassword !== confirmPassword) {
        showMessage('Passwords do not match.', true);
        return;
      }

      if (newPassword.length < 6) {
        showMessage('Password must be at least 6 characters.', true);
        return;
      }

      const submitBtn = e.target.querySelector('button[type="submit"]');
      const originalText = submitBtn.textContent;

      try {
        submitBtn.disabled = true;
        submitBtn.textContent = 'Resetting...';

        const { error } = await supabase.auth.updateUser({ password: newPassword });

        if (error) {
          showMessage(error.message, true);
          return;
        }

        // Show success state
        document.getElementById('reset-form').classList.add('hidden');
        document.getElementById('reset-success').classList.add('active');
        showMessage('Password reset successfully! Redirecting...', false);

        // Redirect after 3 seconds
        setTimeout(() => {
          window.location.href = 'signin.html';
        }, 3000);

      } catch (err) {
        showMessage(err.message, true);
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = originalText;
      }
    });
  });
</script>
</body>
</html>
